name: CI CalculatorGAJ

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Se configura JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
          
      - name: Asegura que gradlew sea ejecutable
        run: chmod +x gradlew

      - name: Compilación
        run: ./gradlew compileJava --no-daemon
